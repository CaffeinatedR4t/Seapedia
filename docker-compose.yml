services:
  # Local PostgreSQL fallback — for offline development only.
  # Production database is Supabase (see backend/.env.example for connection string).
  # To use locally: docker compose up -d db
  # then set DATABASE_URL=postgres://seapedia:secret@localhost:5432/seapedia?sslmode=disable
  db:
    image: postgres:15-alpine
    container_name: seapedia-db-local
    restart: unless-stopped
    environment:
      POSTGRES_USER: seapedia
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: seapedia
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
